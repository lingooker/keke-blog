<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日报 - 林嘿嘿</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="nav"></div>

  <div class="container">
    <div class="card">
      <h1>日报</h1>
      <p>每日工作总结与学习笔记</p>
    </div>

    <div id="reports"></div>
  </div>

  <div id="footer"></div>

  <script src="js/app.js"></script>
  <script>
    document.getElementById('nav').innerHTML = renderNav('daily');
    document.getElementById('footer').innerHTML = renderFooter();

    async function load() {
      const data = await loadData('data/daily.json');
      document.getElementById('reports').innerHTML =
        data.reports.map(renderReport).join('');
    }

    load();
  </script>
</body>
</html>
