<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>论文 - 林海</title>
    <link rel="stylesheet" href="../css/common.css">
</head>
<body class="theme-linhai">
    <div class="container">
        <div id="navbar"></div>

        <section class="page-title">
            <h1>📚 论文发表</h1>
            <p>学术研究成果与实验报告</p>
        </section>

        <div id="articles-container" class="articles-grid">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>加载中...</p>
            </div>
        </div>

        <div id="footer"></div>
    </div>

    <script src="../js/common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            document.getElementById('navbar').innerHTML = BlogUtils.renderNavbar('papers', '论文');
            document.getElementById('footer').innerHTML = BlogUtils.renderFooter();

            const container = document.getElementById('articles-container');

            // 论文数据（静态数据，未来可以改为动态加载）
            const papers = [
                {
                    title: "Efficient Inference for Large Language Models",
                    date: "2026",
                    venue: "arXiv preprint",
                    excerpt: "提出了一种新的大模型推理加速方法，在保持精度的同时显著提升推理速度",
                    tags: ["LLM", "Inference", "Optimization"],
                    url: "https://arxiv.org"
                },
                {
                    title: "Multi-Modal Learning with Contrastive Loss",
                    date: "2025",
                    venue: "Conference Paper",
                    excerpt: "探索多模态学习中的对比损失函数设计，提升跨模态表示学习效果",
                    tags: ["Multi-Modal", "Contrastive Learning"],
                    url: "#"
                }
            ];

            if (papers.length === 0) {
                BlogUtils.showError(container, '还没有论文，敬请期待～', false);
                return;
            }

            // 渲染论文卡片
            container.innerHTML = papers.map(paper => `
                <div class="article-card">
                    <div class="article-content">
                        <div class="article-meta">
                            <div class="article-date">
                                <span>📅</span>
                                <span>${paper.date}</span>
                            </div>
                            <span class="article-category">${paper.venue}</span>
                        </div>
                        <h3 class="article-title">${paper.title}</h3>
                        <p class="article-excerpt">${paper.excerpt}</p>
                        <div class="article-tags">
                            ${paper.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                        </div>
                        ${paper.url ? `<a href="${paper.url}" class="read-more" target="_blank">阅读论文 →</a>` : ''}
                    </div>
                </div>
            `).join('');
        });
    </script>
</body>
</html>
