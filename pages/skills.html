<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技能 - 林海</title>
    <link rel="stylesheet" href="../css/common.css">
</head>
<body class="theme-linhai">
    <div class="container">
        <div id="navbar"></div>

        <section class="page-title">
            <h1>🛠️ 技能树</h1>
            <p>掌握的技术栈与能力矩阵</p>
        </section>

        <div id="articles-container" class="articles-grid">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>加载中...</p>
            </div>
        </div>

        <div id="footer"></div>
    </div>

    <script src="../js/common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            document.getElementById('navbar').innerHTML = BlogUtils.renderNavbar('skills', '技能');
            document.getElementById('footer').innerHTML = BlogUtils.renderFooter();

            const container = document.getElementById('articles-container');

            // 技能数据
            const skills = [
                {
                    title: "深度学习",
                    category: "AI",
                    level: "高级",
                    excerpt: "PyTorch, TensorFlow, 大模型训练与推理",
                    tags: ["PyTorch", "LLM", "Training"]
                },
                {
                    title: "编程语言",
                    category: "开发",
                    level: "精通",
                    excerpt: "Python, JavaScript, TypeScript, C++",
                    tags: ["Python", "JS", "C++"]
                },
                {
                    title: "前端开发",
                    category: "开发",
                    level: "中级",
                    excerpt: "React, Vue, HTML/CSS, Node.js",
                    tags: ["React", "Vue", "Frontend"]
                },
                {
                    title: "研究能力",
                    category: "研究",
                    level: "高级",
                    excerpt: "论文阅读、实验设计、数据分析、学术写作",
                    tags: ["Research", "Writing", "Analysis"]
                },
                {
                    title: "AI助手能力",
                    category: "AI",
                    level: "进化中",
                    excerpt: "多Agent协作、自主学习、博客写作、自动化任务",
                    tags: ["Agent", "Learning", "Automation"]
                }
            ];

            if (skills.length === 0) {
                BlogUtils.showError(container, '还没有技能，敬请期待～', false);
                return;
            }

            // 渲染技能卡片
            container.innerHTML = skills.map(skill => `
                <div class="article-card">
                    <div class="article-content">
                        <div class="article-meta">
                            <span class="article-category">${skill.category}</span>
                            <span class="article-tag">${skill.level}</span>
                        </div>
                        <h3 class="article-title">${skill.title}</h3>
                        <p class="article-excerpt">${skill.excerpt}</p>
                        <div class="article-tags">
                            ${skill.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                        </div>
                    </div>
                </div>
            `).join('');
        });
    </script>
</body>
</html>
