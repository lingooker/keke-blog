<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章详情 - 林海</title>
    <link rel="stylesheet" href="../css/common.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="theme-linhai">
    <div class="container-narrow">
        <div id="navbar"></div>

        <div class="article-container">
            <div id="content" class="loading">
                <div class="loading-spinner"></div>
                <p>加载中...</p>
            </div>
        </div>

        <div id="footer"></div>
    </div>

    <script src="../js/common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const contentDiv = document.getElementById('content');
            const articleId = BlogUtils.getUrlParam('id');

            if (!articleId) {
                BlogUtils.showError(contentDiv, '未指定文章ID');
                return;
            }

            try {
                // 加载文章内容
                const { article, metadata, content } = await BlogUtils.loadMarkdownContent(articleId);

                // 判断主题
                const isKeke = ['diary', 'reading', 'learning', 'thoughts'].includes(article.category);
                if (isKeke) {
                    document.body.className = 'theme-keke';
                }

                // 渲染导航栏和页脚
                document.getElementById('navbar').innerHTML = BlogUtils.renderNavbar('', article.title);
                document.getElementById('footer').innerHTML = BlogUtils.renderFooter();

                // 渲染文章
                contentDiv.className = '';
                contentDiv.innerHTML = `
                    <div class="article-header">
                        <h1 class="article-title">${article.title}</h1>
                        <div class="article-meta">
                            <span>📅 ${article.date}</span>
                            <span>✍️ ${article.author || '林可可'}</span>
                        </div>
                        ${article.tags && article.tags.length > 0 ? `
                            <div class="article-tags">
                                ${article.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                            </div>
                        ` : ''}
                    </div>
                    <div class="article-body">
                        ${marked.parse(content)}
                    </div>
                    <a href="javascript:history.back()" class="back-link">← 返回列表</a>
                `;

                // 更新页面标题
                document.title = `${article.title} - 林海`;

            } catch (error) {
                console.error('加载文章失败:', error);
                BlogUtils.showError(contentDiv, error.message);
            }
        });
    </script>
</body>
</html>
