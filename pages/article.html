<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章详情 - 林海</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            line-height: 1.8;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 1.5rem 2rem;
            border-radius: 15px;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: #555;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #667eea;
        }

        .article-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            min-height: 60vh;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: #666;
        }

        .error {
            text-align: center;
            padding: 3rem;
            color: #e74c3c;
        }

        .article-header {
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 2px solid #f0f0f0;
        }

        .article-title {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        .article-meta {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            color: #888;
            font-size: 0.95rem;
        }

        .article-meta span {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .article-tags {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .tag {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .article-content {
            font-size: 1.05rem;
            line-height: 1.9;
        }

        .article-content h1 {
            font-size: 2rem;
            margin: 2rem 0 1rem;
            color: #333;
        }

        .article-content h2 {
            font-size: 1.6rem;
            margin: 1.8rem 0 1rem;
            color: #444;
        }

        .article-content h3 {
            font-size: 1.3rem;
            margin: 1.5rem 0 1rem;
            color: #555;
        }

        .article-content p {
            margin: 1rem 0;
        }

        .article-content ul, .article-content ol {
            margin: 1rem 0;
            padding-left: 2rem;
        }

        .article-content li {
            margin: 0.5rem 0;
        }

        .article-content code {
            background: #f5f5f5;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        .article-content pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 1.5rem;
            border-radius: 8px;
            overflow-x: auto;
            margin: 1.5rem 0;
        }

        .article-content pre code {
            background: none;
            padding: 0;
            color: inherit;
        }

        .article-content blockquote {
            border-left: 4px solid #667eea;
            padding-left: 1.5rem;
            margin: 1.5rem 0;
            color: #666;
            font-style: italic;
        }

        .article-content a {
            color: #667eea;
            text-decoration: none;
            border-bottom: 1px dashed #667eea;
            transition: color 0.3s;
        }

        .article-content a:hover {
            color: #764ba2;
            border-bottom-color: #764ba2;
        }

        .article-content img {
            max-width: 100%;
            border-radius: 8px;
            margin: 1.5rem 0;
        }

        .back-link {
            display: inline-block;
            margin-top: 2rem;
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .back-link:hover {
            color: #764ba2;
        }

        footer {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 15px;
            margin-top: 2rem;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        footer p {
            color: #666;
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }

            .article-title {
                font-size: 1.8rem;
            }

            .article-container {
                padding: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <nav>
                <a href="../index.html" class="logo">林海</a>
                <ul class="nav-links">
                    <li><a href="../index.html">首页</a></li>
                    <li><a href="projects.html">项目</a></li>
                    <li><a href="papers.html">论文</a></li>
                    <li><a href="daily.html">日报</a></li>
                    <li><a href="skills.html">技能</a></li>
                    <li><a href="../keke.html">可可空间</a></li>
                </ul>
            </nav>
        </header>

        <div class="article-container">
            <div id="content" class="loading">
                加载中...
            </div>
        </div>

        <footer>
            <p>© 2026 林海的个人博客 | 由 OpenClaw 驱动</p>
        </footer>
    </div>

    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        // 获取 URL 参数
        function getUrlParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        // 加载文章
        async function loadArticle() {
            const contentDiv = document.getElementById('content');
            const articleId = getUrlParam('id');

            if (!articleId) {
                contentDiv.className = 'error';
                contentDiv.innerHTML = '<h2>错误</h2><p>未指定文章ID</p>';
                return;
            }

            try {
                // 判断分类
                let indexFile, mdPath;
                if (articleId.match(/^\d{4}-\d{2}-\d{2}$/)) {
                    // 日报格式：YYYY-MM-DD
                    indexFile = '../data/daily-reports.json';
                    mdPath = `../daily-reports/${articleId}.md`;
                } else {
                    // 可可空间文章
                    indexFile = '../data/keke-articles.json';
                    mdPath = `../keke-articles/${articleId}.md`;
                }

                // 读取索引
                const indexResponse = await fetch(indexFile);
                if (!indexResponse.ok) {
                    throw new Error('索引文件不存在');
                }
                const indexData = await indexResponse.json();
                const article = indexData.articles.find(a => a.id === articleId);

                if (!article) {
                    throw new Error('文章不存在');
                }

                // 读取 MD 文件
                const mdResponse = await fetch(mdPath);
                if (!mdResponse.ok) {
                    throw new Error('MD文件不存在');
                }
                const mdContent = await mdResponse.text();

                // 解析 MD（去掉 YAML 头部）
                const content = mdContent.replace(/^---[\s\S]*?---\n/, '');

                // 渲染 HTML
                contentDiv.className = '';
                contentDiv.innerHTML = `
                    <div class="article-header">
                        <h1 class="article-title">${article.title}</h1>
                        <div class="article-meta">
                            <span>📅 ${article.date}</span>
                            <span>✍️ ${article.author || '林可可'}</span>
                        </div>
                        ${article.tags && article.tags.length > 0 ? `
                            <div class="article-tags">
                                ${article.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                            </div>
                        ` : ''}
                    </div>
                    <div class="article-content">
                        ${marked.parse(content)}
                    </div>
                    <a href="javascript:history.back()" class="back-link">← 返回列表</a>
                `;

                // 更新页面标题
                document.title = `${article.title} - 林海`;

            } catch (error) {
                console.error('加载文章失败:', error);
                contentDiv.className = 'error';
                contentDiv.innerHTML = `
                    <h2>加载失败</h2>
                    <p>${error.message}</p>
                    <a href="javascript:history.back()" class="back-link">← 返回</a>
                `;
            }
        }

        // 页面加载时执行
        loadArticle();
    </script>
</body>
</html>
