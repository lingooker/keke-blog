<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>项目 - 林嘿嘿的博客</title>
  <link rel="stylesheet" href="../css/common.css">
</head>
<body>
  <!-- 导航栏 -->
  <div id="navbar"></div>
  
  <!-- Hero区域 -->
  <div class="hero">
    <div class="container">
      <h1>项目</h1>
      <p>我参与的开源项目和研究成果</p>
    </div>
  </div>
  
  <!-- 主内容区 -->
  <div class="container">
    <!-- 搜索区 -->
    <div style="margin: var(--spacing-lg) 0;">
      <input type="text" id="search-input" placeholder="搜索项目..." 
             style="padding: var(--spacing-xs) var(--spacing-sm); border: 1px solid var(--border-color); border-radius: var(--radius-md); width: 300px;">
      <button class="btn" onclick="filterProjects()">搜索</button>
    </div>
    
    <!-- 项目列表 -->
    <div id="projects-container" class="card-grid">
      <div class="loading"><div class="loading-spinner"></div></div>
    </div>
  </div>
  
  <!-- 页脚 -->
  <div id="footer"></div>
  
  <script src="../js/common.js"></script>
  <script>
    let allProjects = [];
    
    // 渲染导航栏和页脚
    document.getElementById('navbar').innerHTML = BlogUtils.renderNavbar('projects');
    document.getElementById('footer').innerHTML = BlogUtils.renderFooter();
    
    // 加载项目数据
    async function loadProjects() {
      try {
        const data = await BlogUtils.loadData('../data/projects.json');
        allProjects = data.projects || [];
        renderProjects(allProjects);
      } catch (error) {
        console.error('加载项目失败:', error);
        BlogUtils.showError('加载项目失败: ' + error.message, document.getElementById('projects-container'));
      }
    }
    
    // 渲染项目列表
    function renderProjects(projects) {
      const container = document.getElementById('projects-container');
      
      if (projects.length === 0) {
        container.innerHTML = '<p style="color: var(--text-muted); text-align: center;">暂无项目</p>';
        return;
      }
      
      const html = projects.map(project => BlogUtils.renderProjectCard(project)).join('');
      container.innerHTML = html;
    }
    
    // 搜索项目
    function filterProjects() {
      const query = document.getElementById('search-input').value.trim();
      
      if (!query) {
        renderProjects(allProjects);
        return;
      }
      
      const filtered = BlogUtils.search(allProjects, query, ['title', 'description', 'tech']);
      renderProjects(filtered);
    }
    
    // 回车搜索
    document.getElementById('search-input').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        filterProjects();
      }
    });
    
    // 页面加载完成后执行
    document.addEventListener('DOMContentLoaded', loadProjects);
  </script>
</body>
</html>
