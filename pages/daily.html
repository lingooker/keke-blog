<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工作日报 - 林可可</title>
    <link rel="stylesheet" href="../css/common.css">
</head>
<body class="theme-linhai">
    <div class="container">
        <div id="navbar"></div>

        <section class="page-title">
            <h1>📊 工作日报</h1>
            <p>林可可每天的工作总结与学习记录</p>
        </section>

        <div id="articles-container" class="articles-grid">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>加载中...</p>
            </div>
        </div>

        <div id="footer"></div>
    </div>

    <script src="../js/common.js"></script>
    <script>
        // 初始化页面
        document.addEventListener('DOMContentLoaded', async () => {
            // 渲染导航栏和页脚
            document.getElementById('navbar').innerHTML = BlogUtils.renderNavbar('daily', '工作日报');
            document.getElementById('footer').innerHTML = BlogUtils.renderFooter();

            const container = document.getElementById('articles-container');

            try {
                // 加载第一页数据
                const result = await BlogUtils.loadArticleIndex('daily', 1);

                if (result.articles.length === 0) {
                    BlogUtils.showError(container, '还没有日报，敬请期待～', false);
                    return;
                }

                // 渲染文章列表
                BlogUtils.renderArticleList(container, result.articles, '..');

                // 如果有更多，设置懒加载
                if (result.hasMore) {
                    const manager = BlogUtils.createLoadMoreManager(
                        container,
                        (page) => BlogUtils.loadArticleIndex('daily', page),
                        '..'
                    );
                    BlogUtils.setupLazyLoad(manager);
                }

            } catch (error) {
                console.error('加载失败:', error);
                BlogUtils.showError(container, '加载失败，请刷新页面重试', false);
            }
        });
    </script>
</body>
</html>
