<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>林嘿嘿的博客</title>
  <link rel="stylesheet" href="css/common.css">
</head>
<body>
  <!-- 导航栏 -->
  <div id="navbar"></div>
  
  <!-- Hero区域 -->
  <div class="hero">
    <div class="container">
      <h1>林嘿嘿的博客</h1>
      <p>清华大学 | 大模型研究 | 记录学习、研究、思考</p>
    </div>
  </div>
  
  <!-- 主内容区 -->
  <div class="container">
    <!-- 最新论文 -->
    <section id="papers-section">
      <h2 style="margin: var(--spacing-lg) 0 var(--spacing-md);">最新论文</h2>
      <div id="papers-container" class="card-grid">
        <div class="loading"><div class="loading-spinner"></div></div>
      </div>
      <div style="text-align: center; margin-top: var(--spacing-md);">
        <a href="pages/papers.html" class="btn btn-outline">查看全部论文</a>
      </div>
    </section>
    
    <!-- 最新项目 -->
    <section id="projects-section">
      <h2 style="margin: var(--spacing-lg) 0 var(--spacing-md);">最新项目</h2>
      <div id="projects-container" class="card-grid">
        <div class="loading"><div class="loading-spinner"></div></div>
      </div>
      <div style="text-align: center; margin-top: var(--spacing-md);">
        <a href="pages/projects.html" class="btn btn-outline">查看全部项目</a>
      </div>
    </section>
    
    <!-- 最新日报 -->
    <section id="daily-section">
      <h2 style="margin: var(--spacing-lg) 0 var(--spacing-md);">最新日报</h2>
      <div id="daily-container" class="card-grid">
        <div class="loading"><div class="loading-spinner"></div></div>
      </div>
      <div style="text-align: center; margin-top: var(--spacing-md);">
        <a href="pages/daily.html" class="btn btn-outline">查看全部日报</a>
      </div>
    </section>
  </div>
  
  <!-- 页脚 -->
  <div id="footer"></div>
  
  <script src="js/common.js"></script>
  <script>
    // 渲染导航栏和页脚
    document.getElementById('navbar').innerHTML = BlogUtils.renderNavbar('home');
    document.getElementById('footer').innerHTML = BlogUtils.renderFooter();
    
    // 加载论文数据（最新3篇）
    async function loadPapers() {
      try {
        const data = await BlogUtils.loadData('data/papers.json');
        const papers = data.papers || [];
        const latestPapers = papers.slice(0, 3);
        
        const container = document.getElementById('papers-container');
        if (latestPapers.length === 0) {
          container.innerHTML = '<p style="color: var(--text-muted);">暂无论文</p>';
          return;
        }
        
        const html = latestPapers.map(paper => BlogUtils.renderPaperCard(paper)).join('');
        container.innerHTML = html;
      } catch (error) {
        console.error('加载论文失败:', error);
        BlogUtils.showError('加载论文失败: ' + error.message, document.getElementById('papers-container'));
      }
    }
    
    // 加载项目数据（最新3个）
    async function loadProjects() {
      try {
        const data = await BlogUtils.loadData('data/projects.json');
        const projects = data.projects || [];
        const latestProjects = projects.slice(0, 3);
        
        const container = document.getElementById('projects-container');
        if (latestProjects.length === 0) {
          container.innerHTML = '<p style="color: var(--text-muted);">暂无项目</p>';
          return;
        }
        
        const html = latestProjects.map(project => BlogUtils.renderProjectCard(project)).join('');
        container.innerHTML = html;
      } catch (error) {
        console.error('加载项目失败:', error);
        BlogUtils.showError('加载项目失败: ' + error.message, document.getElementById('projects-container'));
      }
    }
    
    // 加载日报数据（最新3篇）
    async function loadDaily() {
      try {
        const data = await BlogUtils.loadData('data/daily.json');
        const reports = data.reports || [];
        const latestReports = reports.slice(0, 3);
        
        const container = document.getElementById('daily-container');
        if (latestReports.length === 0) {
          container.innerHTML = '<p style="color: var(--text-muted);">暂无日报</p>';
          return;
        }
        
        const html = latestReports.map(report => BlogUtils.renderDailyCard(report)).join('');
        container.innerHTML = html;
      } catch (error) {
        console.error('加载日报失败:', error);
        BlogUtils.showError('加载日报失败: ' + error.message, document.getElementById('daily-container'));
      }
    }
    
    // 页面加载完成后执行
    document.addEventListener('DOMContentLoaded', () => {
      loadPapers();
      loadProjects();
      loadDaily();
    });
  </script>
</body>
</html>
