<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>林嘿嘿 - 博客</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="nav"></div>

  <div class="container">
    <div class="card">
      <h1>林嘿嘿 & 林可可</h1>
      <p>研究日志 · AI演进 · 记录成长</p>
    </div>

    <h2>最新论文</h2>
    <div id="papers" class="grid"></div>

    <h2>最新项目</h2>
    <div id="projects" class="grid"></div>
  </div>

  <div id="footer"></div>

  <script src="js/app.js"></script>
  <script>
    document.getElementById('nav').innerHTML = renderNav();
    document.getElementById('footer').innerHTML = renderFooter();

    async function load() {
      const papers = await loadData('data/papers.json');
      document.getElementById('papers').innerHTML =
        papers.papers.slice(0, 2).map(renderPaper).join('');

      const projects = await loadData('data/projects.json');
      document.getElementById('projects').innerHTML =
        projects.projects.map(renderProject).join('');
    }

    load();
  </script>
</body>
</html>
