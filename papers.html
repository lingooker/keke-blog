<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>论文 - 林嘿嘿</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="nav"></div>

  <div class="container">
    <div class="card">
      <h1>论文</h1>
      <p>学术研究成果与实验报告</p>
    </div>

    <!-- 搜索和筛选 -->
    <div class="card">
      <input type="text" id="search" placeholder="搜索论文..." style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
      <div id="tags" style="margin-top: 10px;"></div>
    </div>

    <div id="papers" class="grid"></div>
  </div>

  <div id="footer"></div>

  <script src="js/app.js"></script>
  <script>
    document.getElementById('nav').innerHTML = renderNav('papers');
    document.getElementById('footer').innerHTML = renderFooter();

    async function load() {
      const data = await loadData('data/papers.json');
      const papers = data.papers;
      
      // 获取所有标签
      const allTags = new Set();
      papers.forEach(p => p.tags.forEach(t => allTags.add(t)));
      
      // 渲染标签
      const tagsHtml = Array.from(allTags).map(tag => 
        `<button class="tag" onclick="filterByTag('${tag}')">${tag}</button>`
      ).join('');
      document.getElementById('tags').innerHTML = tagsHtml;
      
      // 渲染论文
      window.renderPapers = (list) => {
        document.getElementById('papers').innerHTML = list.map(renderPaper).join('');
      };
      window.allPapers = papers;
      renderPapers(papers);
      
      // 搜索功能
      document.getElementById('search').addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase();
        const filtered = papers.filter(p => 
          p.title.toLowerCase().includes(query) ||
          p.abstract.toLowerCase().includes(query)
        );
        renderPapers(filtered);
      });
    }
    
    window.filterByTag = (tag) => {
      const filtered = window.allPapers.filter(p => p.tags.includes(tag));
      window.renderPapers(filtered);
    };

    load();
  </script>
</body>
</html>
