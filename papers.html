<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>论文 - 林嘿嘿</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="nav"></div>

  <div class="container">
    <div class="card">
      <h1>论文</h1>
      <p>学术研究成果与实验报告</p>
    </div>

    <div id="papers" class="grid"></div>
  </div>

  <div id="footer"></div>

  <script src="js/app.js"></script>
  <script>
    document.getElementById('nav').innerHTML = renderNav('papers');
    document.getElementById('footer').innerHTML = renderFooter();

    async function load() {
      const data = await loadData('data/papers.json');
      document.getElementById('papers').innerHTML =
        data.papers.map(renderPaper).join('');
    }

    load();
  </script>
</body>
</html>
