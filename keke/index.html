<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>可可空间 - 林可可的博客</title>
  <link rel="stylesheet" href="../css/common.css">
  <style>
    /* Tab导航样式 */
    .tabs {
      display: flex;
      gap: var(--spacing-xs);
      margin: var(--spacing-lg) 0;
      border-bottom: 2px solid var(--border-color);
      padding-bottom: var(--spacing-xs);
    }
    
    .tab-btn {
      padding: var(--spacing-sm) var(--spacing-md);
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      color: var(--text-secondary);
      font-size: 1rem;
      cursor: pointer;
      transition: var(--transition);
      font-weight: 500;
    }
    
    .tab-btn:hover {
      color: var(--primary);
    }
    
    .tab-btn.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }
    
    /* 文章卡片 */
    .article-card {
      background: var(--bg-primary);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      padding: var(--spacing-lg);
      margin-bottom: var(--spacing-md);
      transition: var(--transition);
      border-left: 4px solid var(--primary);
    }
    
    .article-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateX(4px);
    }
    
    .article-meta {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      margin-bottom: var(--spacing-sm);
      font-size: 0.875rem;
      color: var(--text-muted);
    }
    
    .article-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--spacing-sm);
    }
    
    .article-title a {
      color: inherit;
      text-decoration: none;
    }
    
    .article-title a:hover {
      color: var(--primary);
    }
    
    .article-excerpt {
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: var(--spacing-sm);
    }
    
    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: var(--spacing-xl);
      color: var(--text-muted);
    }
    
    .empty-state-icon {
      font-size: 4rem;
      margin-bottom: var(--spacing-sm);
    }
  </style>
</head>
<body class="theme-keke">
  <!-- 导航栏 -->
  <div id="navbar"></div>
  
  <!-- Hero区域 -->
  <div class="hero">
    <div class="container">
      <h1>可可空间</h1>
      <p>林可可的博客 | 记录学习、思考、成长</p>
    </div>
  </div>
  
  <!-- 主内容区 -->
  <div class="container">
    <!-- Tab导航 -->
    <div class="tabs">
      <button class="tab-btn active" data-category="all" onclick="filterByCategory('all')">
        ✨ 全部
      </button>
      <button class="tab-btn" data-category="diary" onclick="filterByCategory('diary')">
        📔 日记随笔
      </button>
      <button class="tab-btn" data-category="reading" onclick="filterByCategory('reading')">
        📖 阅读心得
      </button>
      <button class="tab-btn" data-category="learning" onclick="filterByCategory('learning')">
        🎓 学习笔记
      </button>
      <button class="tab-btn" data-category="reflection" onclick="filterByCategory('reflection')">
        💭 人生感悟
      </button>
    </div>
    
    <!-- 文章列表 -->
    <div id="articles-container">
      <div class="loading"><div class="loading-spinner"></div></div>
    </div>
  </div>
  
  <!-- 页脚 -->
  <div id="footer"></div>
  
  <script src="../js/common.js"></script>
  <script>
    let allArticles = [];
    let currentCategory = 'all';
    
    // 渲染导航栏和页脚
    document.getElementById('navbar').innerHTML = BlogUtils.renderNavbar('keke');
    document.getElementById('footer').innerHTML = BlogUtils.renderFooter();
    
    // 加载文章数据
    async function loadArticles() {
      try {
        const data = await BlogUtils.loadData('../data/keke/keke-articles.json');
        allArticles = data.articles || [];
        // 按日期倒序排序
        allArticles.sort((a, b) => new Date(b.date) - new Date(a.date));
        renderArticles(allArticles);
      } catch (error) {
        console.error('加载文章失败:', error);
        showError('加载文章失败: ' + error.message);
      }
    }
    
    // 渲染文章列表
    function renderArticles(articles) {
      const container = document.getElementById('articles-container');
      
      if (articles.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📝</div>
            <p>暂无文章</p>
          </div>
        `;
        return;
      }
      
      const categoryEmojis = {
        diary: '📔',
        reading: '📖',
        learning: '🎓',
        reflection: '💭'
      };
      
      const categoryNames = {
        diary: '日记',
        reading: '阅读',
        learning: '学习',
        reflection: '感悟'
      };
      
      let html = '';
      articles.forEach(article => {
        const emoji = categoryEmojis[article.category] || '📝';
        const categoryName = categoryNames[article.category] || article.category;
        
        html += `
          <article class="article-card">
            <div class="article-meta">
              <span>${emoji} ${categoryName}</span>
              <span>•</span>
              <span>${formatDate(article.date)}</span>
              ${article.author ? `<span>•</span><span>${escapeHtml(article.author)}</span>` : ''}
            </div>
            <h2 class="article-title">
              <a href="${article.url || '#'}">${escapeHtml(article.title)}</a>
            </h2>
            <p class="article-excerpt">${escapeHtml(article.excerpt)}</p>
            ${article.tags && article.tags.length > 0 ? `
              <div class="tags" style="display: flex; gap: var(--spacing-xs); flex-wrap: wrap;">
                ${article.tags.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('')}
              </div>
            ` : ''}
          </article>
        `;
      });
      
      container.innerHTML = html;
    }
    
    // 按分类筛选
    function filterByCategory(category) {
      currentCategory = category;
      
      // 更新Tab按钮状态
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.dataset.category === category) {
          btn.classList.add('active');
        }
      });
      
      // 筛选文章
      let filtered = allArticles;
      if (category !== 'all') {
        filtered = allArticles.filter(article => article.category === category);
      }
      
      renderArticles(filtered);
    }
    
    // 格式化日期
    function formatDate(dateStr) {
      const date = new Date(dateStr);
      const options = { year: 'numeric', month: 'long', day: 'numeric' };
      return date.toLocaleDateString('zh-CN', options);
    }
    
    // HTML转义
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    // 显示错误
    function showError(message) {
      const container = document.getElementById('articles-container');
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">❌</div>
          <p>${escapeHtml(message)}</p>
        </div>
      `;
    }
    
    // 页面加载完成后执行
    document.addEventListener('DOMContentLoaded', loadArticles);
  </script>
</body>
</html>
