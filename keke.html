<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可可空间 - 林可可</title>
    <link rel="stylesheet" href="css/common.css">
</head>
<body class="theme-keke">
    <div class="container">
        <div id="navbar"></div>

        <section class="page-title">
            <h1>😘 可可空间</h1>
            <p>林可可的博客空间 - 记录成长、分享思考</p>
        </section>

        <div class="category-tabs">
            <button class="tab active" data-category="all">全部</button>
            <button class="tab" data-category="diary">📔 日记随笔</button>
            <button class="tab" data-category="reading">📖 阅读心得</button>
            <button class="tab" data-category="learning">🎓 学习笔记</button>
            <button class="tab" data-category="thoughts">💭 人生感悟</button>
        </div>

        <div id="articles-container" class="articles-grid">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>加载中...</p>
            </div>
        </div>

        <div id="footer"></div>
    </div>

    <script src="js/common.js"></script>
    <script>
        let allArticles = [];
        let currentCategory = 'all';
        let loadMoreManager = null;

        // 初始化页面
        document.addEventListener('DOMContentLoaded', async () => {
            // 渲染导航栏和页脚
            document.getElementById('navbar').innerHTML = BlogUtils.renderNavbar('keke', '', true);
            document.getElementById('footer').innerHTML = BlogUtils.renderFooter();

            // 绑定标签切换
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    filterArticles(this.dataset.category);
                });
            });

            // 加载文章
            await loadArticles();
        });

        // 加载文章
        async function loadArticles() {
            const container = document.getElementById('articles-container');

            try {
                const result = await BlogUtils.loadArticleIndex('keke', 1, 1000); // 一次性加载全部（文章不多）
                allArticles = result.articles;

                if (allArticles.length === 0) {
                    BlogUtils.showError(container, '还没有文章，敬请期待～', false);
                    return;
                }

                // 按日期倒序
                allArticles.sort((a, b) => new Date(b.date) - new Date(a.date));

                // 显示全部
                filterArticles('all');

            } catch (error) {
                console.error('加载失败:', error);
                BlogUtils.showError(container, '加载失败，请刷新页面重试', false);
            }
        }

        // 筛选文章
        function filterArticles(category) {
            currentCategory = category;
            const container = document.getElementById('articles-container');

            const filtered = category === 'all'
                ? allArticles
                : allArticles.filter(a => a.category === category);

            if (filtered.length === 0) {
                const categoryName = BlogUtils.CONFIG.CATEGORY_NAMES[category] || '';
                BlogUtils.showError(container, `没有${categoryName}文章，敬请期待～`, false);
                return;
            }

            BlogUtils.renderArticleList(container, filtered, 'pages');
        }
    </script>
</body>
</html>
