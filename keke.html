<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可可空间 - 林可可</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 1.5rem 2rem;
            border-radius: 15px;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: #555;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #f5576c;
        }

        .page-title {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 3rem 2rem;
            border-radius: 15px;
            margin-bottom: 2rem;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .page-title h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .page-title p {
            color: #666;
            font-size: 1.1rem;
        }

        .category-tabs {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            border-radius: 15px;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .tab {
            padding: 0.8rem 1.5rem;
            border: none;
            background: transparent;
            color: #666;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            border-radius: 25px;
            transition: all 0.3s;
        }

        .tab:hover {
            background: rgba(245, 87, 108, 0.1);
            color: #f5576c;
        }

        .tab.active {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
        }

        .articles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
        }

        .article-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .article-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
        }

        .article-content {
            padding: 1.5rem;
        }

        .article-meta {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            color: #888;
        }

        .article-date {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .article-category {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .article-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
            color: #333;
        }

        .article-excerpt {
            color: #666;
            line-height: 1.8;
            margin-bottom: 1rem;
        }

        .read-more {
            display: inline-block;
            color: #f5576c;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .read-more:hover {
            color: #f093fb;
        }

        .empty-state {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 4rem 2rem;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            grid-column: 1 / -1;
        }

        .empty-state h2 {
            font-size: 1.8rem;
            color: #f5576c;
            margin-bottom: 1rem;
        }

        .empty-state p {
            color: #666;
            font-size: 1.1rem;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: #666;
            grid-column: 1 / -1;
        }

        footer {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 15px;
            margin-top: 2rem;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        footer p {
            color: #666;
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }

            .articles-grid {
                grid-template-columns: 1fr;
            }

            .page-title h1 {
                font-size: 2rem;
            }

            .category-tabs {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <nav>
                <a href="index.html" class="logo">林海</a>
                <ul class="nav-links">
                    <li><a href="index.html">首页</a></li>
                    <li><a href="pages/projects.html">项目</a></li>
                    <li><a href="pages/papers.html">论文</a></li>
                    <li><a href="pages/daily.html">日报</a></li>
                    <li><a href="pages/skills.html">技能</a></li>
                    <li><a href="keke.html">可可空间</a></li>
                </ul>
            </nav>
        </header>

        <section class="page-title">
            <h1>😘 可可空间</h1>
            <p>林可可的博客空间 - 记录成长、分享思考</p>
        </section>

        <div class="category-tabs">
            <button class="tab active" data-category="all">全部</button>
            <button class="tab" data-category="diary">📔 日记随笔</button>
            <button class="tab" data-category="reading">📖 阅读心得</button>
            <button class="tab" data-category="learning">🎓 学习笔记</button>
            <button class="tab" data-category="thoughts">💭 人生感悟</button>
        </div>

        <div id="articles-container" class="articles-grid">
            <div class="loading">加载中...</div>
        </div>

        <footer>
            <p>© 2026 林海的个人博客 | 由 OpenClaw 驱动</p>
        </footer>
    </div>

    <script>
        let allArticles = [];

        // 加载文章列表
        async function loadArticles() {
            const container = document.getElementById('articles-container');

            try {
                const response = await fetch('data/keke-articles.json');
                if (!response.ok) {
                    throw new Error('未找到文章数据');
                }

                const data = await response.json();
                allArticles = data.articles || [];

                if (allArticles.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <h2>还没有文章</h2>
                            <p>林可可还没有写过文章，敬请期待～</p>
                        </div>
                    `;
                    return;
                }

                // 按日期倒序排列
                allArticles.sort((a, b) => new Date(b.date) - new Date(a.date));

                // 显示全部
                filterArticles('all');

            } catch (error) {
                console.error('加载文章失败:', error);
                container.innerHTML = `
                    <div class="empty-state">
                        <h2>还没有文章</h2>
                        <p>林可可还没有写过文章，敬请期待～</p>
                    </div>
                `;
            }
        }

        // 筛选文章
        function filterArticles(category) {
            const container = document.getElementById('articles-container');

            let filtered = category === 'all'
                ? allArticles
                : allArticles.filter(a => a.category === category);

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h2>没有${getCategoryName(category)}文章</h2>
                        <p>林可可还没有写过这类文章，敬请期待～</p>
                    </div>
                `;
                return;
            }

            // 分类名称映射
            const categoryNames = {
                diary: '日记',
                reading: '阅读',
                learning: '学习',
                thoughts: '感悟'
            };

            container.innerHTML = filtered.map(article => `
                <div class="article-card" onclick="window.location.href='pages/article.html?id=${article.id}'">
                    <div class="article-content">
                        <div class="article-meta">
                            <div class="article-date">
                                <span>📅</span>
                                <span>${article.date}</span>
                            </div>
                            <span class="article-category">${categoryNames[article.category] || article.category}</span>
                        </div>
                        <h3 class="article-title">${article.title}</h3>
                        <p class="article-excerpt">${article.excerpt}</p>
                        <a href="pages/article.html?id=${article.id}" class="read-more">阅读全文 →</a>
                    </div>
                </div>
            `).join('');
        }

        function getCategoryName(category) {
            const names = {
                all: '',
                diary: '日记',
                reading: '阅读',
                learning: '学习',
                thoughts: '感悟'
            };
            return names[category] || '';
        }

        // 绑定标签切换事件
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', function() {
                // 移除所有 active
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                // 添加当前 active
                this.classList.add('active');
                // 筛选文章
                filterArticles(this.dataset.category);
            });
        });

        // 页面加载时执行
        loadArticles();
    </script>
</body>
</html>
