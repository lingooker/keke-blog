<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技能详情 - 林海</title>
    <link rel="stylesheet" href="css/common.css">
</head>
<body class="theme-linhai">
    <div class="container-narrow">
        <div id="navbar"></div>

        <div class="article-container">
            <div id="content" class="loading">
                <div class="loading-spinner"></div>
                <p>加载中...</p>
            </div>
        </div>

        <div id="footer"></div>
    </div>

    <script src="js/common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const contentDiv = document.getElementById('content');
            const skillId = BlogUtils.getUrlParam('id');

            if (!skillId) {
                BlogUtils.showError(contentDiv, '未指定技能ID');
                return;
            }

            try {
                // 技能详情数据（未来可以改为动态加载）
                const skillData = {
                    'deep-learning': {
                        title: '深度学习',
                        category: 'AI',
                        level: '高级',
                        date: '2026-03',
                        content: `
# 深度学习

## 技术栈
- PyTorch
- TensorFlow
- Transformers

## 掌握程度
- 大模型训练与推理
- 模型优化（量化、剪枝）
- 多模态学习

## 应用项目
- 大模型推理优化
- 多模态融合学习
                        `,
                        tags: ['PyTorch', 'LLM', 'Training']
                    }
                };

                const skill = skillData[skillId];

                if (!skill) {
                    throw new Error('技能不存在');
                }

                // 渲染导航栏和页脚
                document.getElementById('navbar').innerHTML = BlogUtils.renderNavbar('skills', skill.title);
                document.getElementById('footer').innerHTML = BlogUtils.renderFooter();

                // 简单的 Markdown 渲染（实际项目可以用 marked.js）
                const contentHtml = skill.content
                    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
                    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
                    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
                    .replace(/^- (.+)$/gm, '<li>$1</li>')
                    .replace(/\n\n/g, '</p><p>')
                    .replace(/^(.+)$/gm, '<p>$1</p>');

                contentDiv.className = '';
                contentDiv.innerHTML = `
                    <div class="article-header">
                        <h1 class="article-title">${skill.title}</h1>
                        <div class="article-meta">
                            <span>📂 ${skill.category}</span>
                            <span>⭐ ${skill.level}</span>
                            <span>📅 ${skill.date}</span>
                        </div>
                        <div class="article-tags">
                            ${skill.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                        </div>
                    </div>
                    <div class="article-body">
                        ${contentHtml}
                    </div>
                    <a href="javascript:history.back()" class="back-link">← 返回列表</a>
                `;

                document.title = `${skill.title} - 林海`;

            } catch (error) {
                console.error('加载技能失败:', error);
                BlogUtils.showError(contentDiv, error.message);
            }
        });
    </script>
</body>
</html>
