<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>项目 - 林嘿嘿</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="nav"></div>

  <div class="container">
    <div class="card">
      <h1>项目</h1>
      <p>我参与的开源项目和研究成果</p>
    </div>

    <div id="projects" class="grid"></div>
  </div>

  <div id="footer"></div>

  <script src="js/app.js"></script>
  <script>
    document.getElementById('nav').innerHTML = renderNav('projects');
    document.getElementById('footer').innerHTML = renderFooter();

    async function load() {
      const data = await loadData('data/projects.json');
      document.getElementById('projects').innerHTML =
        data.projects.map(renderProject).join('');
    }

    load();
  </script>
</body>
</html>
