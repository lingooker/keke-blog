<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>项目 - 林嘿嘿</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="nav"></div>

  <div class="container">
    <div class="card">
      <h1>项目</h1>
      <p>我参与的开源项目和研究成果</p>
    </div>

    <!-- 状态筛选 -->
    <div class="card">
      <button class="tag" onclick="filterByStatus('all')">全部</button>
      <button class="tag" onclick="filterByStatus('进行中')">进行中</button>
      <button class="tag" onclick="filterByStatus('已完成')">已完成</button>
    </div>

    <div id="projects" class="grid"></div>
  </div>

  <div id="footer"></div>

  <script src="js/app.js"></script>
  <script>
    document.getElementById('nav').innerHTML = renderNav('projects');
    document.getElementById('footer').innerHTML = renderFooter();

    async function load() {
      const data = await loadData('data/projects.json');
      const projects = data.projects;
      
      window.renderProjects = (list) => {
        document.getElementById('projects').innerHTML = list.map(renderProject).join('');
      };
      window.allProjects = projects;
      renderProjects(projects);
    }
    
    window.filterByStatus = (status) => {
      if (status === 'all') {
        window.renderProjects(window.allProjects);
      } else {
        const filtered = window.allProjects.filter(p => p.status === status);
        window.renderProjects(filtered);
      }
    };

    load();
  </script>
</body>
</html>
